name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Wails CLI
        run: |
          $env:Path += ";$env:USERPROFILE\go\bin"
          go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Windows exe and installer
        env:
          NSISDIR: 'C:\Program Files (x86)\NSIS'
        run: |
          $ErrorActionPreference = 'Continue'
          $ws = "${{ github.workspace }}"
          $ws = $ws.Replace('\n', '\')
          Write-Host "Workspace: $ws"
          cd desktop
          wails build -platform windows/amd64 -o n2nGUI.exe
          $scriptPath = Join-Path $ws "desktop\build\windows\installer\project.nsi"
          Write-Host "Full script path: $scriptPath"
          & "$env:NSISDIR\makensis.exe" $scriptPath 2>&1 | ForEach-Object { Write-Host $_ }

      - name: Upload Windows assets
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/build/bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
