name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            goos: linux
            goarch: amd64
            cgo: 1
            output: n2nGUI-linux-x64
          - platform: linux/arm64
            goos: linux
            goarch: arm64
            cgo: 0
            output: n2nGUI-linux-arm64
          - platform: windows/amd64
            goos: windows
            goarch: amd64
            cgo: 1
            output: n2nGUI-windows-x64.exe

    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install arm64 cross-compiler
        if: matrix.goarch == 'arm64'
        run: |
          apt-get update -qq && apt-get install -y -qq gcc-aarch64-linux-gnu > /dev/null 2>&1 || true

      - name: Build ${{ matrix.platform }}
        working-directory: desktop
        run: |
          if [ "${{ matrix.cgo }}" = "1" ]; then
            export CGO_ENABLED=1
          else
            export CGO_ENABLED=0
          fi
          wails build -platform ${{ matrix.platform }} -o ${{ matrix.output }}
          cp build/bin/${{ matrix.output }} ../${{ matrix.output }}

      - name: Check output file
        run: ls -lah ${{ matrix.output }}

      - name: Upload ${{ matrix.platform }} asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.output }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
