name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Wails CLI
        run: |
          $env:Path += ";$env:USERPROFILE\go\bin"
          go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        run: choco install nsis -y

      - name: Debug paths
        run: |
          Write-Host "PWD: $PWD"
          Write-Host "GITHUB_WORKSPACE: $env:GITHUB_WORKSPACE"
          Get-ChildItem | Select-Object Name

      - name: Build Windows exe
        working-directory: desktop
        run: |
          wails build -platform windows/amd64 -o n2nGUI.exe
          Write-Host "Built exe, listing bin directory:"
          Get-ChildItem "$PWD\build\bin"

      - name: Build NSIS installer
        working-directory: desktop
        env:
          NSISDIR: 'C:\Program Files (x86)\NSIS'
        run: |
          Write-Host "NSIS path: $env:NSISDIR"
          Write-Host "PWD: $PWD"
          $script = Join-Path $PWD "build\windows\installer\project.nsi"
          Write-Host "Script: $script"
          if (Test-Path $script) {
            Write-Host "Script exists, running makensis..."
            & "$env:NSISDIR\makensis.exe" $script
          } else {
            Write-Host "Script not found!"
            Get-ChildItem "$PWD\build\windows\installer"
          }

      - name: List build outputs
        run: |
          Get-ChildItem desktop/build/bin/

      - name: Upload Windows assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/build/bin/n2nGUI.exe
            desktop/build/bin/*-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
